<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺灣岩石探索 AR：從地質生成到空間分布</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene
        embedded
        vr-mode-ui="enabled: false;"
        arjs="sourceType: webcam; debugUIEnabled: false;"
    >

        <!-- =========================
             Marker 1：Hiro = 火成岩
        ========================== -->
        <a-marker preset="hiro">
            <!-- 岩石模型 -->
            <a-cone
                position="0 0.5 0"
                radius-bottom="0.35"
                radius-top="0.1"
                height="0.8"
                color="#B22222">
            </a-cone>

            <!-- 標題 -->
            <a-text
                value="火成岩"
                position="0 1.2 0"
                anchor="center"
                color="#FFFFFF"
                width="3">
            </a-text>

            <!-- 說明文字 -->
            <a-text
                value="岩漿冷卻凝固形成\n例：安山岩、玄武岩、花崗岩"
                position="0 0 0"
                anchor="center"
                color="#FFD700"
                width="3">
            </a-text>

            <!-- 補充底板 -->
            <a-plane
                position="0 0.2 -0.01"
                rotation="-90 0 0"
                width="1.8"
                height="1.2"
                color="#333333"
                opacity="0.6">
            </a-plane>
        </a-marker>

        <!-- =========================
             Marker 2：Kanji = 沉積岩
        ========================== -->
        <a-marker preset="kanji">
            <!-- 岩石模型 -->
            <a-box
                position="0 0.45 0"
                width="0.8"
                height="0.5"
                depth="0.5"
                color="#C2B280">
            </a-box>

            <!-- 分層效果 -->
            <a-box
                position="0 0.62 0"
                width="0.8"
                height="0.05"
                depth="0.5"
                color="#8B7355">
            </a-box>

            <a-box
                position="0 0.45 0"
                width="0.8"
                height="0.05"
                depth="0.5"
                color="#8B7355">
            </a-box>

            <a-box
                position="0 0.28 0"
                width="0.8"
                height="0.05"
                depth="0.5"
                color="#8B7355">
            </a-box>

            <!-- 標題 -->
            <a-text
                value="沉積岩"
                position="0 1.1 0"
                anchor="center"
                color="#FFFFFF"
                width="3">
            </a-text>

            <!-- 說明文字 -->
            <a-text
                value="由風化、搬運、沉積、壓實形成\n例：礫岩、砂岩、頁岩"
                position="0 -0.05 0"
                anchor="center"
                color="#00FFFF"
                width="3">
            </a-text>

            <!-- 補充底板 -->
            <a-plane
                position="0 0.2 -0.01"
                rotation="-90 0 0"
                width="1.8"
                height="1.2"
                color="#333333"
                opacity="0.6">
            </a-plane>
        </a-marker>

        <!-- =========================
             Marker 3：Barcode 5 = 變質岩
        ========================== -->
        <a-marker type="barcode" value="5">
            <!-- 岩石模型 -->
            <a-octahedron
                position="0 0.5 0"
                radius="0.4"
                color="#708090">
            </a-octahedron>

            <!-- 標題 -->
            <a-text
                value="變質岩"
                position="0 1.15 0"
                anchor="center"
                color="#FFFFFF"
                width="3">
            </a-text>

            <!-- 說明文字 -->
            <a-text
                value="受高溫高壓作用而變質\n例：板岩、大理岩、片岩"
                position="0 0 0"
                anchor="center"
                color="#FFB6C1"
                width="3">
            </a-text>

            <!-- 補充底板 -->
            <a-plane
                position="0 0.2 -0.01"
                rotation="-90 0 0"
                width="1.8"
                height="1.2"
                color="#333333"
                opacity="0.6">
            </a-plane>
        </a-marker>

        <!-- 相機 -->
        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
